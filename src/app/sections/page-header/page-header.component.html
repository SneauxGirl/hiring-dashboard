<header class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
  <div
    class="flex min-h-[length:var(--dashboard-header-row-height)] min-w-0 flex-col justify-end"
  >
    <h1 class="sr-only">Hiring dashboard</h1>
    <p class="m-0 text-[length:var(--font-size-heading-sm)] font-normal leading-snug text-color">
      {{ timeGreeting }}{{ firstName }}.
    </p>
    <p class="text-accent m-0 mt-1.5 text-muted-color">
      Here's what's happening with your hiring.
    </p>
  </div>

  <div class="dashboard-story-calendar shrink-0 self-start sm:self-center">
    <p-datepicker
      [ngModel]="selectedDate"
      (ngModelChange)="onDateChange($event)"
      [inline]="true"
      [showIcon]="true"
      [minDate]="calendarMinDate"
      [maxDate]="calendarMaxDate"
      [disabledDates]="disabledStoryDates"
      [defaultDate]="selectedDate"
      [showOtherMonths]="false"
      ariaLabel="Select date"
      styleClass="dashboard-story-datepicker"
      panelStyleClass="dashboard-story-datepicker-panel"
    >
      <ng-template #date let-date>
        <span
          class="dashboard-story-day"
          [class.dashboard-story-day--data]="isStoryDay(date)"
          [class.dashboard-story-day--viewer-today]="isViewerToday(date)"
        >
          {{ date.day }}
        </span>
      </ng-template>
    </p-datepicker>
  </div>
</header>
