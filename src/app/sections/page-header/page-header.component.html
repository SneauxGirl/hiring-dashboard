<header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <div class="min-w-0">
    <h1
      class="m-0 flex min-h-[length:var(--dashboard-header-row-height)] items-end font-[family-name:var(--font-heading)] text-[length:var(--font-size-heading-lg)] font-semibold leading-none text-color"
    >
      <span
        class="font-[family-name:var(--font-accent)] text-[length:var(--font-accent-size)] leading-none font-[weight:var(--font-accent-weight)] text-[color:var(--font-accent-color)]"
        >{{ timeGreeting }}{{ firstName }}</span
      >
    </h1>
    <p
      class="m-0 mt-1 text-[0.8rem] font-normal uppercase tracking-[0.08em] text-muted-color"
    >
      Here's what's happening with your hiring.
    </p>
  </div>

  <div class="flex shrink-0 items-center gap-2 self-start sm:self-center">
    <span class="pi pi-calendar text-muted-color" aria-hidden="true"></span>
    <p-select
      [options]="weekOptions"
      [(ngModel)]="selectedWeek"
      optionLabel="label"
      optionValue="value"
      ariaLabel="Select week"
      class="week-range-select w-full min-w-[12rem] sm:min-w-[14rem]"
      panelStyleClass="week-range-select-panel"
    />
  </div>
</header>
