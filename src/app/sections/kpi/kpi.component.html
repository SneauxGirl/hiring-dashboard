<section
  class="flex flex-row flex-wrap gap-3 xl:flex-nowrap"
  aria-label="Key performance indicators"
>
  @for (kpi of kpis; track kpi.label) {
    <p-card styleClass="min-w-0 flex-1 basis-[calc(50%-0.375rem)] xl:basis-0">
      <div class="flex min-w-0 flex-col gap-1.5 xl:gap-2">
        <span class="text-pretty text-[length:var(--font-size-label)] leading-snug text-muted-color">{{
          kpi.label
        }}</span>

        <div
          class="font-[family-name:var(--font-heading)] text-[1.375rem] leading-none font-semibold xl:text-[2rem]"
          [style.color]="metricColor(kpi)"
        >
          <span>{{ kpi.value }}</span>
          @if (kpi.valueUnit) {
            <span class="text-[1.125rem] font-medium xl:text-[1.35rem]"> {{ kpi.valueUnit }}</span>
          }
        </div>

        @if (kpi.delta) {
          <div
            class="flex min-w-0 flex-wrap items-center gap-x-1 gap-y-0.5 text-[length:var(--font-size-label)] leading-snug"
            [style.color]="metricColor(kpi)"
          >
            @if (trendIcon(kpi.trend); as icon) {
              <span class="shrink-0" [class]="icon" aria-hidden="true"></span>
            }
            <span class="min-w-0">{{ kpi.delta }}</span>
          </div>
        }
      </div>
    </p-card>
  }
</section>
