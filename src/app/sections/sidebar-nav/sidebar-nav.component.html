<nav
  id="sidebar-main-nav"
  class="sidebar-nav flex h-full w-full min-w-0 flex-col border-r border-surface bg-surface-0 px-3 pb-[length:var(--sidebar-edge-gap)] pt-[length:var(--dashboard-header-padding-block)] lg:pt-[length:var(--dashboard-header-padding-block-lg)]"
  aria-label="Main navigation"
>
  <div
    class="flex min-h-[length:var(--dashboard-header-row-height)] items-center gap-2"
    [class.justify-between]="!collapsed"
    [class.justify-center]="collapsed"
  >
    @if (!collapsed) {
      <div class="sidebar-brand flex min-w-0 items-center">
        <img
          src="/PurplePipLogo.png"
          alt="PIP Tech"
          class="block h-[length:var(--dashboard-brand-logo-height)] w-auto max-w-full shrink-0 -translate-y-0.5 object-contain"
        />
      </div>
    }

    <button
      type="button"
      class="inline-flex size-[length:var(--sidebar-toggle-size)] shrink-0 cursor-pointer items-center justify-center rounded-border border-0 bg-transparent p-0 text-muted-color hover:bg-[color:var(--p-content-hover-background)] hover:text-[color:var(--p-text-hover-color)] focus:outline-none focus-visible:shadow-[inset_0_0_0_2px_var(--pip-nav-active-ink)]"
      [attr.aria-expanded]="!collapsed"
      aria-controls="sidebar-main-nav"
      [attr.aria-label]="toggleLabel"
      (click)="toggle.emit()"
    >
      <span
        class="pi text-base"
        [class.pi-chevron-left]="!collapsed"
        [class.pi-chevron-right]="collapsed"
        aria-hidden="true"
      ></span>
    </button>
  </div>

  <p-menu
    [model]="menuModel"
    [popup]="false"
    ariaLabel="Dashboard sections"
    [styleClass]="navMenuStyleClass"
    [pt]="navMenuPt"
  />

  <p-card styleClass="sidebar-user-card mt-auto w-full border-t border-surface pt-4 mb-4">
    <div class="sidebar-user flex items-center gap-3" aria-label="Signed in user">
      <p-avatar
        [image]="user.avatarUrl"
        shape="circle"
        [attr.aria-label]="user.name"
      />
      <div class="sidebar-user-text min-w-0">
        <div class="truncate text-base font-medium text-color">{{ user.name }}</div>
        <div class="truncate text-[length:var(--font-size-label)] text-muted-color">{{ user.title }}</div>
      </div>
    </div>
  </p-card>
</nav>
